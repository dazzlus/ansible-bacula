[all:vars]
ansible_user = admin-ansible
ansible_ssh_private_key_file = ~/.ssh/id_rsa

[bacula_director]
director ansible_host=<IP_Director> ansible_connection=local

[bacula_storage]
storage ansible_host=<IP_Storage>

[bacula_clients]
client1 ansible_host=<IP_Client1>
client2 ansible_host=<IP_Client2>
