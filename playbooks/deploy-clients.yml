- name: Deploy Bacula File Daemon on clients
  hosts: bacula_clients
  become: true
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Remove broken repository-devel from sources.list
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: 'repository-devel'
        state: absent
      become: true
    - name: Install Bacula File Daemon
      apt:
        name: bacula-fd
        state: present
    - name: Deploy bacula-fd.conf from template
      template:
        src: ../templates/bacula-fd.conf.j2
        dest: /etc/bacula/bacula-fd.conf
        owner: bacula
        group: bacula
        mode: '0640'
      notify: restart bacula-fd
    - name: Add execaps to bacula-fd init script for MAC compliance
      ansible.builtin.lineinfile:
        path: /etc/init.d/bacula-fd
        regexp: '^start-stop-daemon -c "\$DAEMONUSER" --start'
        line: 'execaps -c 0x1000 -- start-stop-daemon -c "$DAEMONUSER" --start'
        backup: yes
      notify: restart bacula-fd
    - name: Create restore directory on clients
      file:
        path: /tmp/bacula-restores
        state: directory
        owner: bacula
        group: bacula
        mode: '0755'
    - name: Ensure Bacula File Daemon is running
      service:
        name: bacula-fd
        state: started
        enabled: yes
  handlers:
    - name: restart bacula-fd
      service:
        name: bacula-fd
        state: restarted